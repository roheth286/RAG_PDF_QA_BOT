<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini PDF Q&A Bot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #030712 100%);
            --panel-bg: rgba(17, 24, 39, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-purple: #8b5cf6;
            --accent-purple-glow: rgba(139, 92, 246, 0.35);
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.2);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --chat-user-bg: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            --chat-bot-bg: rgba(31, 41, 55, 0.6);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --font-main: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Glassmorphism App Container */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            min-height: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow-lg), 0 0 40px rgba(139, 92, 246, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow Blobs */
        .app-container::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--accent-purple-glow);
            filter: blur(80px);
            top: -50px;
            right: -50px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Header Area */
        header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: rgba(17, 24, 39, 0.4);
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, #f3f4f6, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Model Badge styling */
        .model-badge {
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #c084fc;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.05);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .model-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #c084fc;
            border-radius: 50%;
            box-shadow: 0 0 8px #c084fc;
            animation: pulse-dot 1.8s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(192, 132, 252, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(192, 132, 252, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(192, 132, 252, 0); }
        }

        /* PDF Upload Component */
        .upload-section {
            padding: 16px 28px;
            background: rgba(17, 24, 39, 0.2);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .file-upload-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(31, 41, 55, 0.5);
            border: 1.5px dashed rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .file-upload-label:hover {
            border-color: var(--accent-purple);
            background: rgba(139, 92, 246, 0.05);
            color: var(--text-primary);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .upload-btn {
            background: var(--chat-user-bg);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.4);
            filter: brightness(1.1);
        }

        .upload-btn:disabled {
            background: #374151;
            box-shadow: none;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .upload-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding: 0 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #6b7280;
        }

        .status-dot.active {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .status-dot.loading {
            background-color: #f59e0b;
            animation: pulse-dot 1.2s infinite;
        }

        /* Chat Display Area */
        .chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            animation: pop-in 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes pop-in {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-row.user .message-bubble {
            background: var(--chat-user-bg);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message-row.bot .message-bubble {
            background: var(--chat-bot-bg);
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Empty state styling */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-secondary);
            gap: 16px;
            animation: fade-in 0.5s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .empty-icon {
            font-size: 3rem;
            opacity: 0.4;
        }

        /* Chat Input Field */
        .input-section {
            padding: 20px 28px;
            border-top: 1px solid var(--panel-border);
            background: rgba(17, 24, 39, 0.5);
            z-index: 10;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(31, 41, 55, 0.4);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 8px 12px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px var(--accent-purple-glow);
            background: rgba(31, 41, 55, 0.6);
        }

        .input-wrapper textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.95rem;
            resize: none;
            height: 44px;
            padding: 10px 4px;
            max-height: 150px;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background: var(--chat-user-bg);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            align-self: flex-end;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .send-btn:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transform: rotate(45deg);
            margin-left: -2px;
            margin-top: 2px;
        }

        /* Typing indicator dots */
        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 6px 10px;
            align-items: center;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="header-title-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M19,2H5C3.89,2 3,2.89 3,4V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V4C21,2.89 20.1,2 19,2M19,20H5V4H19V20M11,6H13V10H17V12H13V16H11V12H7V10H11V6Z"/>
                    </svg>
                </div>
                <h1>Gemini PDF Q&A Bot</h1>
            </div>
            <div class="model-badge">Gemini 2.5 Flash</div>
        </header>

        <!-- PDF Upload Form -->
        <div class="upload-section">
            <div class="file-upload-wrapper">
                <label for="pdf-file" class="file-upload-label" id="upload-label">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <span>Click or Drag to Upload PDF Document</span>
                </label>
                <input type="file" id="pdf-file" accept=".pdf">
            </div>
            <button class="upload-btn" id="upload-btn" disabled>Analyze</button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chat-area">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📂</div>
                <h3>Start by Uploading a PDF</h3>
                <p>Upload a document using the panel above, and ask Gemini questions about it.</p>
            </div>
        </div>

        <!-- Chat Input Area -->
        <div class="input-section">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Ask a question about the document..." disabled></textarea>
                <button class="send-btn" id="send-btn" disabled>
                    <svg viewBox="0 0 24 24">
                        <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/>
                    </svg>
                </button>
            </div>
            <div class="upload-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">No document loaded</span>
            </div>
        </div>
    </div>

    <script>
        const pdfFileInput = document.getElementById('pdf-file');
        const uploadLabel = document.getElementById('upload-label');
        const uploadBtn = document.getElementById('upload-btn');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatArea = document.getElementById('chat-area');
        const emptyState = document.getElementById('empty-state');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let isDocumentLoaded = false;

        // Auto-expand textarea height
        chatInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = (this.scrollHeight - 10) + 'px';
        });

        // Trigger file input check
        pdfFileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                const filename = this.files[0].name;
                uploadLabel.querySelector('span').innerText = filename;
                uploadBtn.disabled = false;
            } else {
                uploadLabel.querySelector('span').innerText = 'Click or Drag to Upload PDF Document';
                uploadBtn.disabled = true;
            }
        });

        // Handle upload submission
        uploadBtn.addEventListener('click', async function() {
            if (pdfFileInput.files.length === 0) return;

            const file = pdfFileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            // Update UI state to processing
            uploadBtn.disabled = true;
            pdfFileInput.disabled = true;
            statusDot.className = 'status-dot loading';
            statusText.innerText = 'Analyzing document...';
            
            // Add a bot notification message
            clearEmptyState();
            appendBotMessage("Analyzing and indexing " + file.name + "... Please wait.");

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok) {
                    statusDot.className = 'status-dot active';
                    statusText.innerText = 'Document analyzed: ' + file.name;
                    isDocumentLoaded = true;
                    chatInput.disabled = false;
                    sendBtn.disabled = false;
                    appendBotMessage("Success! The document has been analyzed. You can now ask questions.");
                } else {
                    throw new Error(data.error || 'Unknown error occurred');
                }
            } catch (err) {
                statusDot.className = 'status-dot';
                statusText.innerText = 'Failed to load document';
                appendBotMessage("Error: " + err.message);
                uploadBtn.disabled = false;
                pdfFileInput.disabled = false;
            }
        });

        // Send query to flask server
        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query || !isDocumentLoaded) return;

            // Clear input field
            chatInput.value = '';
            chatInput.style.height = '44px';

            // Add user message to UI
            appendUserMessage(query);

            // Add temporary typing indicator
            const typingIndicator = appendTypingIndicator();
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: query })
                });
                const data = await response.json();

                // Remove typing indicator
                typingIndicator.remove();

                if (response.ok) {
                    appendBotMessage(data.answer);
                } else {
                    throw new Error(data.error || 'Server error');
                }
            } catch (err) {
                typingIndicator.remove();
                appendBotMessage("Failed to get answer: " + err.message);
            }

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Event listeners for sending queries
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Helper functions for appending elements to Chat
        function clearEmptyState() {
            if (emptyState) {
                emptyState.style.display = 'none';
            }
        }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row user';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerText = text;
            
            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendBotMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row bot';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerText = text;
            
            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendTypingIndicator() {
            const row = document.createElement('div');
            row.className = 'message-row bot';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';
            
            bubble.appendChild(dots);
            row.appendChild(bubble);
            chatArea.appendChild(row);
            return row;
        }
    </script>
</body>
</html>
